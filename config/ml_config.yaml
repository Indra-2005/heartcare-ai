# Machine Learning Pipeline Configuration for HeartCare AI

data:
  # Path to the preprocessed dataset used for training/validation (0-indexed targets)
  dataset_path: "data/Heart_disease_cleveland_new.csv"
  # Name of the target label column (binary classification: 0 = healthy, 1 = heart disease)
  target_column: "target"

model:
  # Base classifier algorithm from scikit-learn
  algorithm: "RandomForestClassifier"
  
  # Hyperparameters tuned to balance accuracy and prevent overfitting
  hyperparameters:
    n_estimators: 200
    max_depth: 8
    min_samples_split: 10
    min_samples_leaf: 4
    max_features: "sqrt"
    class_weight: "balanced"         # Explicitly constrained to avoid overfitting
    random_state: 42      # Set for train/test splitting and classifier reproducibility
    
  # File path where the serialized trained model object (pickle format) will be saved
  output_path: "models/heart_disease_model.pkl"
